<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character 움지기</title>
    <style>
        *{
          margin: 0;
          padding: 0;
        }
        .bigbox{
          width: 404px;
          /* flex 컨테이너 */
          display: flex;
          /* 404px 넘으면 다음 줄로(2x2 배치) */
          flex-wrap: wrap;
        }
        .box{
          width: 200px;
          height: 200px;
          border: 1px solid gray;
          /* 박스 안에 이미지 정렬용 flex 컨테이너 */
          display: flex;
        }
        .Character{
         width: 100px;
        height: 100px;
        }
        #box1{
          background-color: blue;
          /* 중앙 */
          justify-content: center;
          align-items: center;
        }
        #box2{
          background-color: red;
          /* 우상단 */
          justify-content: flex-end;
          align-items: flex-start;
        }
        #box3{
          background-color: yellow;
          justify-content: flex-start;
          align-items: flex-end;
        }
        #box4{
          background-color: orange;
          justify-content: flex-end;
          align-items: flex-end;
        }     
    </style>
</head>
<body>
    <div class="bigbox">
        <div id="box1" class="box">
        <img id="image01" class="Character" src="image/luke.jpg" alt="">
        </div>
        <div id="box2" class="box">
        <img id="image02" img class="Character" src="image/luke.jpg" alt="">
        </div>
        <div id="box3" class="box">
        <img id="image03" img class="Character" src="image/luke.jpg" alt="">
        </div>
        <div id="box4" class="box">
        <img id="image04" img class="Character" src="image/luke.jpg" alt="">
        </div>
    </div>
</body>
</html>
